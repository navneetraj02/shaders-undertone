<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertones 3 - Shaders</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Inter font to match the sleek agency look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Target Element for Shader -->
    <div id="shader-container"></div>

    <!-- Load Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    
    <!-- Load our new shader component -->
    <script src="UndertonesShader.js"></script>
    
    <!-- Initialize and configure -->
    <script>
        // Initialize the premium glass background
        const background = new UndertonesShader({
            selector: 'body',
            backgroundColor: '#ffffff',
            cursorBaseColor: '#ffffff',
            cursorUpColor: '#7f66ff',
            cursorDownColor: '#4642ff',
            cursorLeftColor: '#56c2fc',
            cursorRightColor: '#5b4fff',
            cursorRadius: 2.2,
            flutes: 22.0,
            zIndex: -99
        });
    </script>
</body>
</html>
